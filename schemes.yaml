# 可用因子名参考
# ──────────────────────────────────────────────────────
# 因子名               权重键名                  说明
# momentum_20d          momentum_score           20日动量
# vol_ratio             vol_ratio_score          量比
# volatility_20d        volatility_score         20日波动率
# rsi_14d               rsi_score                14日RSI
# ma_deviation_20d      ma_deviation_score       均线偏离
# turnover_momentum_10d turnover_momentum_score  换手动量
# intraday_range_10d    intraday_range_score     日内波幅
# pe_ttm_rank           pe_ttm_rank_score        PE分位
# pb_rank               pb_rank_score            PB分位
# return_20d            return_20d_score         20日收益
# trend_60d             trend_score              60日趋势
# ──────────────────────────────────────────────────────

schemes:
  default:
    description: 默认方案
    factors:
    - intraday_range_10d
    - pb_rank
    - pe_ttm_rank
    - trend_60d
    - volatility_20d
    weights:
      intraday_range_score: -0.15
      pb_rank_score: -0.25
      pe_ttm_rank_score: -0.2
      trend_score: -0.1
      volatility_score: -0.15
  conservative:
    description: 低估值稳健策略
    factors:
    - pb_rank
    - pe_ttm_rank
    - trend_60d
    - volatility_20d
    - turnover_momentum_10d
    weights:
      pb_rank_score: -0.3
      pe_ttm_rank_score: -0.25
      trend_score: -0.15
      volatility_score: -0.15
      turnover_momentum_score: -0.15
  momentum:
    description: 动量反转策略
    factors:
    - momentum_20d
    - vol_ratio
    - rsi_14d
    - volatility_20d
    - return_20d
    weights:
      momentum_score: 0.3
      vol_ratio_score: 0.2
      rsi_score: -0.25
      volatility_score: -0.15
      return_20d_score: 0.1
